name: WebRTC C SDK CI
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
jobs:
  linux-cross-compilation:
    strategy:
      matrix:
        os:
          - name: mips-32
            runner: ubuntu:22.04
            install: gcc-mips-linux-gnu g++-mips-linux-gnu
            cc: mips-linux-gnu-gcc
            cxx: mips-linux-gnu-g++
            additional-cmake: -DBUILD_OPENSSL_PLATFORM=linux-mips32 -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu -DBUILD_LIBSRTP_DESTINATION_PLATFORM=mips-unknown-linux-gnu
            file-contents: "ELF 32-bit MSB executable, MIPS, MIPS32"
          - name: arm-32
            runner: ubuntu:22.04
            install: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            additional-cmake: -DBUILD_OPENSSL_PLATFORM=linux-generic32 -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu -DBUILD_LIBSRTP_DESTINATION_PLATFORM=arm-unknown-linux-uclibcgnueabi
            file-contents: "ELF 32-bit LSB pie executable, ARM"
          - name: arm-64
            runner: ubuntu:22.04
            install: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            additional-cmake: -DBUILD_OPENSSL_PLATFORM=linux-generic64 -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu -DBUILD_LIBSRTP_DESTINATION_PLATFORM=arm-unknown-linux-uclibcgnueabi
            file-contents: "ELF 64-bit LSB pie executable, ARM"
          - name: aarch-64
            runner: ubuntu:22.04
            install: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            additional-cmake: -DBUILD_OPENSSL_PLATFORM=linux-aarch64 -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu -DBUILD_LIBSRTP_DESTINATION_PLATFORM=arm-unknown-linux-uclibcgnueabi
            file-contents: "ELF 64-bit LSB pie executable, ARM"

        config:
          - name: Shared OpenSSL
            cmake_flags: -DBUILD_TEST=ON
          - name: Static OpenSSL
            cmake_flags: -DBUILD_TEST=ON -DBUILD_STATIC_LIBS=TRUE
          - name: Shared MbedTLS
            cmake_flags: -DBUILD_TEST=ON -DUSE_OPENSSL=OFF -DUSE_MBEDTLS=ON
          - name: Static MbedTLS
            cmake_flags: -DBUILD_TEST=ON -DBUILD_STATIC_LIBS=TRUE -DUSE_OPENSSL=OFF
              -DUSE_MBEDTLS=ON
      fail-fast: false
    runs-on: ubuntu-latest
    container:
      image:  ${{ matrix.os.runner }}
    name: ${{ matrix.os.name }}, ${{ matrix.config.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake git pkg-config file ${{ matrix.os.install }}
      - name: Configure and build ${{ matrix.config.name }}
        run: >
          export CC=${{ matrix.os.cc }}

          export CXX=${{ matrix.os.cxx }}

          echo "Using $CC and $CXX"


          mkdir -p build

          cd build


          cmake .. ${{ matrix.config.cmake_flags }} ${{ matrix.os.additional-cmake }} -DENABLE_AWS_SDK_IN_TESTS=OFF

          make -j$(sysctl -n hw.ncpu)
        shell: bash
      - name: Check test file is compiled correctly
        run: |
          cd build
          
          file ./tst/webrtc_client_test
          file ./samples/kvsWebrtcClientMaster
          
          readelf -a ./tst/webrtc_client_test
          readelf -a ./samples/kvsWebrtcClientMaster
          
          file ./tst/webrtc_client_test | grep "${{ matrix.os.file-contents }}"
          file ./samples/kvsWebrtcClientMaster | grep "${{ matrix.os.file-contents }}"
        shell: bash
