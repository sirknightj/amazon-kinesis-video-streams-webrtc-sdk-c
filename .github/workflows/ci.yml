name: WebRTC C SDK CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
jobs:
  macos-static-builds-x86_64:
    runs-on: macos-13 # Intel Chip
    steps:
      - name: Check dependencies
        run: |
          cmake --version

      - name: Clone repository
        uses: actions/checkout@v4

      - name: Build Repository
        run: |
          export CC=$(brew --prefix llvm@15)/bin/clang
          export CXX=$(brew --prefix llvm@15)/bin/clang++

          mkdir build && cd build
          
          
          cmake .. -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX -DBUILD_STATIC_LIBS=ON
          
          make

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.architecture }}-build
          path: ./build

  macos-static-build-arm64:
    runs-on: macos-14 # Apple silicon chip
    steps:
      - name: Check dependencies
        run: |
          cmake --version

      - name: Clone repository
        uses: actions/checkout@v4

      - name: Build Repository
        run: |
          export CC=$(brew --prefix llvm@15)/bin/clang
          export CXX=$(brew --prefix llvm@15)/bin/clang++
          
          mkdir build && cd build
          
          cmake .. -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX -DBUILD_STATIC_LIBS=ON
          
          make

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.architecture }}-build
          path: ./build
